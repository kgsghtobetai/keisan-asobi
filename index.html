@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  min-height: 100vh;
  background: linear-gradient(180deg, #CFE9FF 0%, #EAF7E6 100%);
  background-attachment: fixed;
  color: #29475A;
}

.app {
  max-width: 520px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 0 16px;
  position: relative;
}

.app::before {
  content: '';
  position: fixed;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  width: 560px;
  height: 360px;
  background: radial-gradient(ellipse at 50% 20%, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 70%);
  pointer-events: none;
  z-index: 0;
}

/* \u2500\u2500 Buttons \u2500\u2500 */
.btn {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-weight: 700;
  border: none;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: transform 0.08s ease, box-shadow 0.08s ease;
  position: relative;
  z-index: 1;
}

.btn-start {
  background: linear-gradient(180deg, #FFA040 0%, #FF6A00 100%);
  color: #fff;
  font-size: 1.4rem;
  padding: 16px 0;
  border-radius: 28px;
  box-shadow: 0 6px 0 #CC4A00, 0 8px 18px rgba(255,106,0,0.30);
  width: 100%;
}
.btn-start:active { box-shadow: 0 2px 0 #CC4A00, 0 4px 8px rgba(255,106,0,0.25); transform: translateY(4px); }

.btn-toggle {
  background: #fff;
  color: #29475A;
  font-size: 1rem;
  padding: 10px 0;
  border-radius: 16px;
  box-shadow: 0 4px 0 #C8D8E0, 0 5px 12px rgba(41,71,90,0.10);
  flex: 1;
}
.btn-toggle.selected {
  background: linear-gradient(180deg, #FFA040 0%, #FF6A00 100%);
  color: #fff;
  box-shadow: 0 4px 0 #CC4A00, 0 5px 12px rgba(255,106,0,0.22);
}
.btn-toggle:active { transform: translateY(3px); box-shadow: 0 1px 0 #C8D8E0; }
.btn-toggle.selected:active { transform: translateY(3px); box-shadow: 0 1px 0 #CC4A00; }

.btn-back {
  background: rgba(255,255,255,0.72);
  color: #29475A;
  font-size: 0.9rem;
  padding: 8px 12px;
  border-radius: 14px;
  box-shadow: 0 3px 0 #C8D8E0;
}
.btn-back:active { transform: translateY(2px); box-shadow: 0 1px 0 #C8D8E0; }

.btn-choice {
  background: #fff;
  color: #29475A;
  font-size: 1.8rem;
  font-weight: 800;
  padding: 16px 4px;
  border-radius: 20px;
  box-shadow: 0 5px 0 #C0D2DC, 0 6px 14px rgba(41,71,90,0.12);
  flex: 1;
  min-width: 0;
}
.btn-choice:active { box-shadow: 0 2px 0 #C0D2DC; transform: translateY(3px); }
.btn-choice.correct {
  background: linear-gradient(180deg, #5DD771 0%, #28A745 100%);
  color: #fff;
  box-shadow: 0 5px 0 #187A32;
  animation: bounce 0.5s ease both;
}
.btn-choice.wrong {
  background: #FFE0E0;
  color: #CC2222;
  box-shadow: 0 5px 0 #E8B0B0;
  animation: shake 0.5s ease both;
}

.btn-peek {
  background: rgba(255,255,255,0.85);
  color: #29475A;
  font-size: 0.95rem;
  padding: 10px 20px;
  border-radius: 16px;
  box-shadow: 0 3px 0 #C8D8E0;
  margin-top: 12px;
}
.btn-peek:active { transform: translateY(2px); box-shadow: 0 1px 0 #C8D8E0; }

.btn-retry {
  background: linear-gradient(180deg, #FFA040 0%, #FF6A00 100%);
  color: #fff;
  font-size: 1.2rem;
  padding: 14px 0;
  border-radius: 24px;
  box-shadow: 0 5px 0 #CC4A00;
  width: 100%;
}
.btn-retry:active { transform: translateY(4px); box-shadow: 0 1px 0 #CC4A00; }

.btn-tohome {
  background: rgba(255,255,255,0.65);
  color: #29475A;
  font-size: 1rem;
  padding: 12px 0;
  border-radius: 20px;
  box-shadow: 0 3px 0 #C8D8E0;
  width: 100%;
}
.btn-tohome:active { transform: translateY(2px); box-shadow: 0 1px 0 #C8D8E0; }

/* \u2500\u2500 Progress dots \u2500\u2500 */
.progress-dots { display: flex; gap: 5px; align-items: center; }
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(41,71,90,0.18);
  transition: background 0.3s, transform 0.3s;
}
.dot.done { background: #FF9A3C; }
.dot.current { background: #FF9A3C; transform: scale(1.45); }

/* \u2500\u2500 Tokens \u2500\u2500 */
.token-wrap { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.token-grid-wrap {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 4px;
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
}

/* \u2500\u2500 Banner \u2500\u2500 */
.banner {
  text-align: center;
  font-size: 1.15rem;
  font-weight: 800;
  padding: 10px 20px;
  border-radius: 16px;
}
.banner.correct { background: #D4EDDA; color: #155724; }
.banner.wrong   { background: #FFE0E0; color: #CC2222; }

/* \u2500\u2500 Hidden hint box \u2500\u2500 */
.hint-hidden-box {
  border: 3px dashed rgba(41,71,90,0.22);
  border-radius: 20px;
  padding: 24px 16px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

/* \u2500\u2500 Animations \u2500\u2500 */
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}
@keyframes popIn {
  0%   { transform: scale(0); opacity: 0; }
  70%  { transform: scale(1.18); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  20%       { transform: translateY(-13px); }
  40%       { transform: translateY(-6px); }
  60%       { transform: translateY(-3px); }
  80%       { transform: translateY(-1px); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  15%       { transform: translateX(-9px); }
  30%       { transform: translateX(9px); }
  45%       { transform: translateX(-6px); }
  60%       { transform: translateX(6px); }
  75%       { transform: translateX(-3px); }
  90%       { transform: translateX(3px); }
}

.logo-float { animation: float 3s ease-in-out infinite; }
.result-star-float { animation: float 2.5s ease-in-out infinite; }

/* \u2500\u2500 Explain box \u2500\u2500 */
.explain-box {
  background: rgba(255,255,255,0.92);
  border: 3px solid #FFB300;
  border-radius: 20px;
  padding: 18px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
.btn-next {
  background: linear-gradient(180deg, #5DD771 0%, #28A745 100%);
  color: #fff;
  font-size: 1.2rem;
  padding: 12px 40px;
  border-radius: 20px;
  box-shadow: 0 5px 0 #187A32;
}
.btn-next:active { transform: translateY(3px); box-shadow: 0 2px 0 #187A32; }
.btn-choice:disabled { cursor: default; }

/* \u2500\u2500 Level / XP \u2500\u2500 */
.level-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.85);
  border-radius: 12px;
  padding: 4px 12px;
  font-weight: 800;
  font-size: 0.95rem;
}
.level-bar {
  width: 100%;
  height: 14px;
  border-radius: 8px;
  background: rgba(41,71,90,0.12);
  overflow: hidden;
}
.level-bar-fill {
  height: 100%;
  border-radius: 8px;
  background: linear-gradient(90deg, #FFD34D 0%, #FF9A3C 100%);
  transition: width 0.9s cubic-bezier(0.22, 1, 0.36, 1);
}
.levelup-banner {
  background: linear-gradient(180deg, #FFE79A 0%, #FFC94D 100%);
  color: #7A4A00;
  font-size: 1.3rem;
  font-weight: 800;
  padding: 10px 28px;
  border-radius: 18px;
  box-shadow: 0 4px 0 #D99A00;
  animation: popIn 0.5s ease both;
}
@keyframes sparkle {
  0%   { transform: scale(0) rotate(0deg); opacity: 0; }
  40%  { transform: scale(1.25) rotate(18deg); opacity: 1; }
  100% { transform: scale(0.4) rotate(36deg); opacity: 0; }
}
.sparkle { position: absolute; animation: sparkle 1.4s ease-in-out infinite; }
.train-pop { animation: popIn 0.5s ease both; }

/* \u2500\u2500 Reduced motion \u2500\u2500 */
@media (prefers-reduced-motion: reduce) {
  .logo-float, .result-star-float { animation: none !important; }
  .btn-choice.correct { animation: none !important; }
  .btn-choice.wrong   { animation: none !important; }
  .level-bar-fill { transition: none !important; }
  .levelup-banner, .sparkle, .train-pop { animation: none !important; }
}

/* \u2500\u2500 Small screens \u2500\u2500 */
@media (max-width: 400px) {
  .formula-num  { font-size: 2.2rem !important; }
  .formula-op   { font-size: 2rem !important; }
  .btn-choice   { font-size: 1.4rem !important; padding: 12px 2px !important; }
  .token-grid-wrap { max-width: 260px; }
}
